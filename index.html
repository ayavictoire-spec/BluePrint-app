<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BluePrint</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">

    <header>
      <h1>💙 BluePrint</h1>
      <p id="quote">“Small habits build a better life.”</p>

      <div class="score-box">
        <div>
          <h2 id="score">0%</h2>
          <p>Daily Score</p>
        </div>
      </div>
    </header>

    <section>
      <h2>🌅 Morning</h2>

      <label><input type="checkbox" class="task"> Make your bed</label>
      <label><input type="checkbox" class="task"> Drink water before anything else</label>
      <label><input type="checkbox" class="task"> Brush teeth (AM)</label>
      <label><input type="checkbox" class="task"> Morning skincare</label>
      <label><input type="checkbox" class="task"> Take supplements</label>
      <label><input type="checkbox" class="task"> Eat breakfast</label>
      <label><input type="checkbox" class="task"> Meditation / Buddhism practice</label>
    </section>

    <section>
      <h2>🍎 Health</h2>

      <label><input type="checkbox" class="task"> Eat 3 meals</label>
      <label><input type="checkbox" class="task"> Limit sugar intake</label>
      <label><input type="checkbox" class="task"> Drink enough water</label>
      <label><input type="checkbox" class="task"> Eat slowly (no phone)</label>
      <label><input type="checkbox" class="task"> Stay under 5 hours screen time</label>
    </section>

    <section>
      <h2>🧴 Skincare & Self-care</h2>

      <label><input type="checkbox" class="task"> Night skincare</label>
      <label><input type="checkbox" class="task"> Wash face at night</label>
      <label><input type="checkbox" class="task"> Remove makeup</label>
      <label><input type="checkbox" class="task"> Teeth whitening strips</label>
      <label><input type="checkbox" class="task"> Don’t pick skin</label>
      <label><input type="checkbox" class="task"> Moisturize lips</label>
    </section>

    <section>
      <h2>📱 Digital Wellness</h2>

      <label><input type="checkbox" class="task"> No phone first 30 min</label>
      <label><input type="checkbox" class="task"> No phone before bed</label>
      <label><input type="checkbox" class="task"> Read or listen to music instead of scrolling</label>
      <label><input type="checkbox" class="task"> Reflect on something I learned</label>
    </section>

    <section>
      <h2>🌙 Night Routine</h2>

      <label><input type="checkbox" class="task"> Brush teeth (PM)</label>
      <label><input type="checkbox" class="task"> Floss + mouthwash</label>
      <label><input type="checkbox" class="task"> Night skincare</label>
      <label><input type="checkbox" class="task"> Prepare for tomorrow</label>
    </section>

  </div>

  <script src="script.js"></script>
</body>
</html>
